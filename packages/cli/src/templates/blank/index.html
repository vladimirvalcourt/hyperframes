<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__VIDEO_DURATION__"
      data-width="1920"
      data-height="1080"
    >
      <video
        id="a-roll"
        class="clip"
        src="__VIDEO_SRC__"
        muted
        playsinline
        data-duration="__VIDEO_DURATION__"
        data-track-index="0"
        style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover"
      ></video>
      <audio
        id="a-roll-audio"
        src="__VIDEO_SRC__"
        data-start="0"
        data-duration="__VIDEO_DURATION__"
        data-track-index="2"
        data-volume="1"
      ></audio>

      <!--
        ANIMATION PATTERN: The clip div controls timing/visibility.
        Always put your content in a CHILD element and animate THAT.

        <div class="clip" ...>        ← timing only, don't animate this
          <div id="my-title">...</div> ← animate this with GSAP
        </div>
      -->
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // tl.from("#my-title", { opacity: 0, y: -50, duration: 1 }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
